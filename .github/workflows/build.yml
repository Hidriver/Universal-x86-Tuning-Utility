name: Build and Release

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore "Universal x86 Tuning Utility/Universal x86 Tuning Utility.csproj"

    - name: Build
      run: |
        dotnet build "Universal x86 Tuning Utility/Universal x86 Tuning Utility.csproj" -c Release -p:TreatWarningsAsErrors=false -p:WarningLevel=0 --no-restore
        if ($LASTEXITCODE -ne 0) { exit 1 }

    - name: Publish
      run: dotnet publish "Universal x86 Tuning Utility/Universal x86 Tuning Utility.csproj" -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:TreatWarningsAsErrors=false -p:WarningLevel=0 -o ./publish

    - name: Upload artifact
      uses: actions/upload-artifact@v5
      with:
        name: Universal-x86-Tuning-Utility
        path: ./publish/
        if-no-files-found: error